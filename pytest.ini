[pytest]
# Default: skip the `slow` suite, which hits real external services
# (httpbin.org, real Stripe signature verification with current time).
# Run them explicitly with: pytest -m slow
markers =
    slow: tests that hit real external services or take >2s

# Explicit so a typo doesn't silently match the wrong marker
filterwarnings =
    ignore::DeprecationWarning:fastapi.*
    ignore::DeprecationWarning:sqlalchemy.*
