# Cloud Build pipeline triggered on every push to `main` of
# https://github.com/JSebastianIEU/Craig-Pricing
# (auto-deploys to Cloud Run in project just-print-craig, region europe-west1)
#
# Steps:
#   0. Run the critical tests (chat smoke + flow + pricing engine).
#      If any fail, the build STOPS — nothing reaches Cloud Run.
#      v38.5 — added after the v38.3 NameError shipped to prod silently.
#   1. Build the Docker image from the repo root.
#   2. Push it to Artifact Registry (same repository Cloud Run uses for
#      its automatic `--source` deploys, so permissions are already set).
#   3. Deploy the image as a new revision of the `craig-pricing` Cloud Run
#      service. Only the IMAGE is updated — service-level settings
#      (CRAIG_DATABASE_URL env var, DEEPSEEK_API_KEY, Cloud SQL socket,
#      --min-instances=1, --no-cpu-throttling) stay attached because
#      Cloud Run preserves them across image-only deploys.
#
# No special secrets injected here — everything lives on the Cloud Run
# service itself.

substitutions:
    _REGION: europe-west1
    _SERVICE: craig-pricing
    _REPO: cloud-run-source-deploy

steps:
    # 0. TESTS — run the critical defensive suite BEFORE building / pushing.
    #    If any of these fail, Cloud Build aborts and no deploy happens.
    #    Added after v38's bug parade — pre-v38.5, every code regression
    #    shipped to production because there was no gate.
    #
    #    Covers:
    #      * test_chat_smoke.py — POST /chat round-trip (catches NameError
    #        / import / migration / response-shape breakage)
    #      * test_craig_flow.py — multi-turn conversation contracts +
    #        the 6 production bug regressions
    #      * test_pricing_edge_cases.py — engine boundary conditions
    #      * test_pricing.py — full pricing engine math
    #      * test_cutover_safety.py — v37.7 migration safety
    #      * test_inbound_classifier.py — confidence-tier triage
    #      * test_missive.py — webhook loop-prevention + kill-switch
    #      * test_attribution.py — v40 UTM/click-ID capture + merge +
    #        identity backfill + revenue report
    #
    #    Tests run against a fresh local SQLite (CRAIG_DB_PATH=/tmp/...)
    #    seeded by scripts.startup. ~2-3 min total.
    - name: python:3.11-slim
      id: tests
      entrypoint: bash
      env:
          - STRATEGOS_JWT_SECRET=ci-test-secret-32-bytes-padded-enough
          - CRAIG_DB_PATH=/tmp/craig-ci.db
          - DEEPSEEK_API_KEY=ci-fake-key-no-network-calls-made
      args:
          - -c
          - |
            set -eu
            echo "== Installing deps =="
            pip install --no-cache-dir -r requirements.txt
            pip install --no-cache-dir pytest pytest-cov httpx respx
            echo "== Seeding test DB =="
            python -m scripts.startup
            echo "== Running critical test suite =="
            pytest \
                test_chat_smoke.py \
                test_craig_flow.py \
                test_pricing_edge_cases.py \
                test_pricing.py \
                test_cutover_safety.py \
                test_inbound_classifier.py \
                test_missive.py \
                test_attribution.py \
                -q --no-header --tb=short --maxfail=5
            echo "== All tests passed — proceeding to build =="

    # 1. Build — tagged with the short SHA so every commit is immutable +
    #    traceable from the Cloud Run revision list.
    - name: gcr.io/cloud-builders/docker
      id: build
      waitFor: ['tests']
      args:
          - build
          - -t
          - ${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPO}/${_SERVICE}:$SHORT_SHA
          - -t
          - ${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPO}/${_SERVICE}:latest
          - .

    # 2. Push both tags to Artifact Registry.
    - name: gcr.io/cloud-builders/docker
      id: push
      args:
          - push
          - --all-tags
          - ${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPO}/${_SERVICE}

    # 3. Deploy to Cloud Run, updating only the image.
    - name: gcr.io/google.com/cloudsdktool/cloud-sdk
      id: deploy
      entrypoint: gcloud
      args:
          - run
          - deploy
          - ${_SERVICE}
          - --image=${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPO}/${_SERVICE}:$SHORT_SHA
          - --region=${_REGION}
          - --platform=managed
          - --quiet

images:
    - ${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPO}/${_SERVICE}:$SHORT_SHA
    - ${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPO}/${_SERVICE}:latest

options:
    # Required when the build doesn't specify a logsBucket. Also means
    # build logs stream live to Cloud Logging and can be read via
    # `gcloud run services logs` alongside the service's own logs.
    logging: CLOUD_LOGGING_ONLY
    machineType: E2_HIGHCPU_8

timeout: 1500s  # 25 min — tests ~3, build ~5, push ~2, deploy ~2; rest is headroom.
